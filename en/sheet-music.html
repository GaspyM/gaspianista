<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gaspianista | Covers by Gaspar Mulé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,ital,wght@6..96,1,400;6..96,1,500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <nav class="topbar">
          <div class="nav-links nav-links-left">
            <a href="./project.html">Project</a>
            <a href="./sheet-music.html" aria-current="page">Sheet Music</a>
            <a href="./platforms.html">Platforms</a>
          </div>
          <a class="brand-lockup" href="./index.html" aria-label="Back to home">
            <img class="piano-mark" src="../grand-piano.png" alt="" />
            <span class="brand-name">gaspianista</span>
          </a>
          <div class="nav-actions">
            <a class="button button-primary" href="mailto:mulegaspar@gmail.com">Contact</a>
            <details class="language-menu">
              <summary class="language-trigger" aria-label="Change language">
                <img class="language-flag-image" src="../assets/flags/us.png" alt="" />
                <span class="language-code">US</span>
              </summary>
              <div class="language-dropdown">
                <a href="../catalogo.html"><img class="language-flag-image" src="../assets/flags/es.png" alt="" /> ES</a>
                <a href="./sheet-music.html"><img class="language-flag-image" src="../assets/flags/us.png" alt="" /> US</a>
                <a href="../pt/partituras.html"><img class="language-flag-image" src="../assets/flags/br.png" alt="" /> PT</a>
                <a href="../it/spartiti.html"><img class="language-flag-image" src="../assets/flags/it.png" alt="" /> IT</a>
              </div>
            </details>
          </div>
        </nav>
      </header>

      <main>
        <section class="hero">
          <div class="section-heading reveal">
            <p class="section-kicker">Sheet Music</p>
            <h2>Here you'll be able to find downloadable sheet music and chord sheets from my interpretations.</h2>
          </div>
          <div class="release-list reveal">
            <article class="release-row">
              <p class="collection-type">Featured Song</p>
              <h3>Nadie Como Tu - Marcos Vidal</h3>
              <p class="download-label">DOWNLOAD:</p>
              <div class="inline-actions inline-actions-compact">
                <a class="mini-download-button" href="../nadie-como-tu-marcos-vidal.pdf" data-download-link title="Download sheet music" download>
                  <span class="icon-sheet" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <path d="M7 3.5h7l3 3V20a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1v-15.5Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
                      <path d="M14 3.5V7h3" fill="none" stroke="currentColor" stroke-width="1.5"/>
                      <path d="M9 10.5h6M9 13.5h6M9 16.5h4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                </a>
                <a class="mini-download-button" href="../nadie-como-tu-marcos-vidal-acordes.pdf" data-download-link title="Download chord sheet" download>
                  <span class="icon-chords" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <circle cx="12" cy="12" r="7.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                      <circle cx="12" cy="5.8" r="1.2" fill="currentColor"/>
                      <circle cx="17.2" cy="8.6" r="1.2" fill="currentColor"/>
                      <circle cx="17.1" cy="15.4" r="1.2" fill="currentColor"/>
                      <circle cx="12" cy="18.2" r="1.2" fill="currentColor"/>
                      <circle cx="6.9" cy="15.4" r="1.2" fill="currentColor"/>
                      <circle cx="6.8" cy="8.6" r="1.2" fill="currentColor"/>
                    </svg>
                  </span>
                </a>
              </div>
            </article>
          </div>
        </section>
      </main>
      <footer class="project-footer">
        <p>&copy; 2026 | gaspianista by Gaspar Mulé</p>
      </footer>
    </div>
    <script>
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) entry.target.classList.add("is-visible");
        });
      }, { threshold: 0.16 });
      document.querySelectorAll(".reveal").forEach((element) => observer.observe(element));

      document.querySelectorAll("[data-download-link]").forEach((downloadButton) => {
        downloadButton.addEventListener("click", (event) => {
          event.preventDefault();
          const wantsCoffee = window.confirm(
            "If you want, you can leave a coffee before downloading. If you choose Cancel, the file will still download."
          );

          if (wantsCoffee) {
            window.open("https://cafecito.app/gaspianista", "_blank", "noopener,noreferrer");
          }

          window.location.href = downloadButton.href;
        });
      });
    </script>
  </body>
</html>
